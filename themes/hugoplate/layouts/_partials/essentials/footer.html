<footer class="bg-light dark:bg-darkmode-light">
  <div class="container">
    <div class="row items-center py-4">
      <div class="lg:col-3 mb-4 text-center lg:mb-0 lg:text-left">
        <div class="flex items-center justify-center lg:justify-start gap-3">
          
          <a
            class="navbar-brand inline-block"
            href="{{ site.Home.RelPermalink }}">
            {{ partial "logo" }}
          </a>

          <span class="text-xs opacity-70 text-text-light dark:text-darkmode-text-light">
            {{ site.Params.copyright | markdownify }}
          </span>

        </div>
      </div>
      <div class="lg:col-6 mb-4 text-center lg:mb-0">
        <ul>
          {{ range site.Menus.footer }}
            <li class="m-3 inline-block">
              <a
                {{ if findRE `^http` .URL }}
                  target="_blank" rel="noopener"
                {{ end }}
                href="{{ if findRE `^#` .URL }}
                  {{ if not $.IsHome }}
                    {{ site.Home.RelPermalink }}
                  {{ end }}{{ .URL }}
                {{ else }}
                  {{ .URL | relLangURL }}
                {{ end }}"

                >{{ .Name }}</a
              >
            </li>
          {{ end }}
        </ul>

        <div class="text-xs opacity-60 mt-1">
          {{ i18n "build_hugo" | markdownify }}
        </div>
      </div>
      <div class="lg:col-3 mb-4 text-center lg:mb-0 lg:mt-0 lg:text-right">
        <ul class="social-icons">
          {{ range site.Data.social.main }}
            <li>
              <a
                target="_blank"
                aria-label="{{ .name }}"
                rel="nofollow noopener"
                href="{{ .link | safeURL }}">
                <i class="{{ .icon }}"></i>
              </a>
            </li>
          {{ end }}
        </ul>
      </div>
    </div>
  </div>
  <!-- <div class="border-border dark:border-darkmode-border border-t py-2">
    <div
      class="text-text-light dark:text-darkmode-text-light container text-center">
      <p>
        {{ site.Params.hugo | markdownify }}
      </p>
    </div>
  </div> -->
</footer>
